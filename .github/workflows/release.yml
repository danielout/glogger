name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type or explicit version (patch, minor, major, or x.y.z)"
        required: true
        default: "patch"
        type: string

permissions:
  contents: write

env:
  RELEASE_REPO: ${{ github.repository_owner }}/glogger-release

jobs:
  # ── Step 0: validate the project builds and tests pass ──
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend type-check and build
        run: npm run build

      - name: Rust check and tests
        working-directory: src-tauri
        run: |
          cargo check
          cargo test

  # ── Step 1: bump version, generate changelog, push tag ──
  prepare:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version
        id: version
        shell: bash
        run: |
          chmod +x scripts/bump-version.sh
          scripts/bump-version.sh "${{ github.event.inputs.version }}"
          NEW_VERSION=$(sed -n 's/.*"version"\s*:\s*"\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        shell: bash
        run: |
          chmod +x scripts/generate-changelog.sh
          scripts/generate-changelog.sh > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Commit version bump and tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Upload release notes
        uses: actions/upload-artifact@v6
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  # ── Step 2: build on all platforms with tauri-action ──
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout (at release tag)
        uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.prepare.outputs.version }}
          releaseName: v${{ needs.prepare.outputs.version }}
          releaseBody: ""
          owner: ${{ github.repository_owner }}
          repo: glogger-release
          args: ${{ matrix.args }} --config src-tauri/tauri.release.conf.json
          updaterJsonPreferNsis: true

  # ── Step 3: update release notes on the published release ──
  finalize:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v7
        with:
          name: release-notes

      - name: Update release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"

          # Build a download table from the release assets
          ASSETS=$(gh release view "$TAG" --repo "$RELEASE_REPO" --json assets -q '.assets[].name')
          BASE_URL="https://github.com/$RELEASE_REPO/releases/download/$TAG"

          DOWNLOADS="## Downloads\n\n| Platform | Installer |\n|----------|-----------|"
          while IFS= read -r NAME; do
            case "$NAME" in
              *.exe) DOWNLOADS="$DOWNLOADS\n| **Windows** | [$NAME]($BASE_URL/$NAME) |" ;;
              *.dmg) DOWNLOADS="$DOWNLOADS\n| **macOS** | [$NAME]($BASE_URL/$NAME) |" ;;
              *.deb) DOWNLOADS="$DOWNLOADS\n| **Linux** (Debian/Ubuntu) | [$NAME]($BASE_URL/$NAME) |" ;;
              *.AppImage) DOWNLOADS="$DOWNLOADS\n| **Linux** (AppImage) | [$NAME]($BASE_URL/$NAME) |" ;;
              latest.json) ;; # skip updater manifest
              *.sig) ;; # skip signature files
              *) ;;
            esac
          done <<< "$ASSETS"

          # Prepend downloads table to changelog
          {
            echo -e "$DOWNLOADS"
            echo ""
            echo "---"
            echo ""
            cat RELEASE_NOTES.md
          } > FULL_RELEASE_NOTES.md

          gh release edit "$TAG" \
            --repo "$RELEASE_REPO" \
            --notes-file FULL_RELEASE_NOTES.md
