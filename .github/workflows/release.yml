name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type or explicit version (patch, minor, major, or x.y.z)"
        required: true
        default: "patch"
        type: string

permissions:
  contents: write

env:
  RELEASE_REPO: ${{ github.repository_owner }}/glogger-release

jobs:
  # ── Step 0: validate the project builds and tests pass ──
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend type-check and build
        run: npm run build

      - name: Rust check and tests
        working-directory: src-tauri
        run: |
          cargo check
          cargo test

  # ── Step 1: bump version, generate changelog, push tag ──
  prepare:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version
        id: version
        shell: bash
        run: |
          chmod +x scripts/bump-version.sh
          scripts/bump-version.sh "${{ github.event.inputs.version }}"
          NEW_VERSION=$(sed -n 's/.*"version"\s*:\s*"\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        shell: bash
        run: |
          chmod +x scripts/generate-changelog.sh
          scripts/generate-changelog.sh > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Commit version bump and tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Upload release notes
        uses: actions/upload-artifact@v6
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  # ── Step 2: build on all platforms in parallel ──
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (at release tag)
        uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        shell: bash
        run: npm run tauri:build

      - name: Collect and rename artifacts
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          mkdir -p release-artifacts

          # Windows: NSIS
          for f in "$BUNDLE_DIR"/nsis/*.exe; do
            [ -f "$f" ] && cp "$f" "release-artifacts/glogger-${VERSION}-windows-setup.exe"
          done

          # macOS: DMG
          for f in "$BUNDLE_DIR"/dmg/*.dmg; do
            [ -f "$f" ] && cp "$f" "release-artifacts/glogger-${VERSION}-macos.dmg"
          done

          # Linux: deb + AppImage
          for f in "$BUNDLE_DIR"/deb/*.deb; do
            [ -f "$f" ] && cp "$f" "release-artifacts/glogger-${VERSION}-linux.deb"
          done
          for f in "$BUNDLE_DIR"/appimage/*.AppImage; do
            [ -f "$f" ] && cp "$f" "release-artifacts/glogger-${VERSION}-linux.AppImage"
          done

          echo "Collected artifacts:"
          ls -la release-artifacts/

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-${{ matrix.label }}
          path: release-artifacts/*

  # ── Step 3: collect all artifacts and publish to release repo ──
  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v7
        with:
          name: release-notes

      - name: Download all platform artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: all-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la all-artifacts/

      - name: Publish release to glogger-release repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          BASE_URL="https://github.com/$RELEASE_REPO/releases/download/$TAG"

          # Build a download table from the artifacts that actually exist
          DOWNLOADS="## Downloads\n\n| Platform | Installer |\n|----------|-----------|"
          for file in all-artifacts/*; do
            [ -f "$file" ] || continue
            NAME="$(basename "$file")"
            case "$NAME" in
              *-windows-setup.exe) DOWNLOADS="$DOWNLOADS\n| **Windows** (recommended) | [$NAME]($BASE_URL/$NAME) |" ;;
              *-macos.dmg)         DOWNLOADS="$DOWNLOADS\n| **macOS** | [$NAME]($BASE_URL/$NAME) |" ;;
              *-linux.deb)         DOWNLOADS="$DOWNLOADS\n| **Linux** (Debian/Ubuntu) | [$NAME]($BASE_URL/$NAME) |" ;;
              *-linux.AppImage)    DOWNLOADS="$DOWNLOADS\n| **Linux** (AppImage) | [$NAME]($BASE_URL/$NAME) |" ;;
            esac
          done

          # Prepend downloads table to changelog
          {
            echo -e "$DOWNLOADS"
            echo ""
            echo "---"
            echo ""
            cat RELEASE_NOTES.md
          } > FULL_RELEASE_NOTES.md

          gh release create "$TAG" \
            --repo "$RELEASE_REPO" \
            --title "$TAG" \
            --notes-file FULL_RELEASE_NOTES.md

          for file in all-artifacts/*; do
            [ -f "$file" ] || continue
            echo "Uploading: $file"
            gh release upload "$TAG" "$file" --repo "$RELEASE_REPO"
          done

          echo "Release published: https://github.com/$RELEASE_REPO/releases/tag/$TAG"
